<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Gibraltar Bat</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .checkout-wrap {
      max-width: 500px;
      margin: 5rem auto;
      padding: 0 2rem 5rem;
    }

    .order-summary {
      background: var(--navy);
      color: var(--white);
      border-radius: 10px;
      padding: 2rem 1.8rem;
    }

    .order-summary h2 {
      font-size: 1.15rem;
      margin-bottom: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
    }
    .summary-item:last-of-type { border-bottom: none; }
    .summary-item-name { color: #ddd; }
    .summary-item-price { color: var(--white); font-weight: 700; }

    .summary-empty {
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      color: #aaa;
      padding: 0.5rem 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 2px solid var(--gold);
      font-family: Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
    }
    .summary-total span:last-child { color: var(--gold); font-size: 1.15rem; }

    .btn-place-order {
      display: block;
      width: 100%;
      margin-top: 1.4rem;
      padding: 1rem;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-place-order:hover { background: var(--gold); color: var(--navy); }
    .btn-place-order:disabled { background: #ccc; color: #888; cursor: not-allowed; }

    .empty-warning {
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      color: #cc2200;
      margin-top: 0.6rem;
      display: none;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Gibraltar <span>Bat</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <button class="cart-btn" id="cart-toggle" aria-label="Shopping cart">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-count" id="cart-count"></span>
    </button>
  </nav>

  <div class="checkout-wrap">
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="summary-items"></div>
      <div class="summary-total">
        <span>Total</span>
        <span id="summary-total">$0</span>
      </div>
    </div>
    <p class="empty-warning" id="empty-warning">Please add items to your cart before checking out.</p>
    <button class="btn-place-order" id="place-order-btn">Proceed to Payment</button>
  </div>

  <div class="cart-panel" id="cart-panel">
    <div class="cart-header">Cart</div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-subtotal-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">$0</span>
      </div>
      <a href="checkout.html" class="btn-checkout">Check Out</a>
    </div>
  </div>

  <script src="js/cart.js"></script>
  <script>
    (function () {
      const KEY = 'gibraltar-cart';

      function load() {
        try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
        catch (_) { return []; }
      }

      function renderSummary() {
        var cart    = load();
        var itemsEl = document.getElementById('summary-items');
        var totalEl = document.getElementById('summary-total');
        var btn     = document.getElementById('place-order-btn');
        var warn    = document.getElementById('empty-warning');

        if (cart.length === 0) {
          itemsEl.innerHTML = '<p class="summary-empty">Your cart is empty.</p>';
          totalEl.textContent = '$0';
          btn.disabled = true;
          warn.style.display = 'block';
        } else {
          itemsEl.innerHTML = cart.map(function (item) {
            return '<div class="summary-item"><span class="summary-item-name">' + item.name + '</span><span class="summary-item-price">$' + item.price + '</span></div>';
          }).join('');
          var total = cart.reduce(function (s, i) { return s + i.price; }, 0);
          totalEl.textContent = '$' + total;
          btn.disabled = false;
          warn.style.display = 'none';
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        renderSummary();

        document.getElementById('place-order-btn').addEventListener('click', function () {
          var cart = load();
          if (cart.length === 0) return;

          var btn = document.getElementById('place-order-btn');
          btn.disabled = true;
          btn.textContent = 'Processing...';

          fetch('/api/create-checkout', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ items: cart }),
          })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.url) {
              window.location.href = data.url;
            } else {
              btn.disabled = false;
              btn.textContent = 'Proceed to Payment';
              alert('Error: ' + (data.error || JSON.stringify(data)));
            }
          })
          .catch(function (err) {
            btn.disabled = false;
            btn.textContent = 'Proceed to Payment';
            alert('Something went wrong. Please email us at support@gibraltarbat.com');
          });
        });
      });
    })();
  </script>

</body>
</html>
